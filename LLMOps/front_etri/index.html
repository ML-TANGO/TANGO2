<!DOCTYPE html>

    <script>
      window.addEventListener('error', function(event) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100vw';
        div.style.height = '100vh';
        div.style.backgroundColor = 'rgba(220, 53, 69, 0.95)';
        div.style.color = 'white';
        div.style.zIndex = '999999';
        div.style.padding = '30px';
        div.style.fontFamily = 'monospace';
        div.style.overflow = 'auto';
        div.style.boxSizing = 'border-box';
        div.innerHTML = '<h1 style="margin-top:0;font-size:24px;border-bottom:1px solid rgba(255,255,255,0.3);padding-bottom:10px;">🔴 Unhandled Script Error</h1>' +
                        '<p style="font-size:16px;"><strong>Message:</strong> ' + event.message + '</p>' +
                        '<p style="font-size:14px;"><strong>Source:</strong> ' + event.filename + ':' + event.lineno + ':' + event.colno + '</p>' +
                        '<pre style="background:rgba(0,0,0,0.3);padding:15px;border-radius:4px;white-space:pre-wrap;word-break:break-all;font-size:13px;line-height:1.5;">' + (event.error && event.error.stack ? event.error.stack : 'No stack trace available') + '</pre>';
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(event) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100vw';
        div.style.height = '100vh';
        div.style.backgroundColor = 'rgba(253, 126, 20, 0.95)';
        div.style.color = 'white';
        div.style.zIndex = '999999';
        div.style.padding = '30px';
        div.style.fontFamily = 'monospace';
        div.style.overflow = 'auto';
        div.style.boxSizing = 'border-box';
        var reason = event.reason;
        var message = reason instanceof Error ? reason.message : String(reason);
        var stack = reason instanceof Error && reason.stack ? reason.stack : 'No stack trace available';
        div.innerHTML = '<h1 style="margin-top:0;font-size:24px;border-bottom:1px solid rgba(255,255,255,0.3);padding-bottom:10px;">⚠️ Unhandled Promise Rejection</h1>' +
                        '<p style="font-size:16px;"><strong>Reason:</strong> ' + message + '</p>' +
                        '<pre style="background:rgba(0,0,0,0.3);padding:15px;border-radius:4px;white-space:pre-wrap;word-break:break-all;font-size:13px;line-height:1.5;">' + stack + '</pre>';
        document.body.appendChild(div);
      });
    </script>
