model: Qwen/Qwen3-8B
data_path: data/logickor_sft_high_converted.jsonl
max_seq_length: 4096

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

split:
  train_ratio: 0.9

training:
  cuda_visible_devices: "0"
  num_train_epochs: 4
  learning_rate: 5.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  optim: adamw_torch
  weight_decay: 0.0
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  gradient_checkpointing: true
  logging_steps: 10
  eval_steps: 20
  save_steps: 20
  save_total_limit: 2
  bf16: true
  fp16: false

early_stopping:
  patience: 3
  threshold: 0.0
