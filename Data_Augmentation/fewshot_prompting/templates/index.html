<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Web UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; flex-direction: column; height: 100vh; }
        .container { max-width: 800px; flex-grow: 1; display: flex; flex-direction: column; padding-bottom: 1rem; }
        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
            background-color: white;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            margin-top: 1rem;
        }
        .message {
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
            max-width: 75%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .message.user {
            background-color: #0d6efd;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }
        .message.model {
            background-color: #e9ecef;
            color: #212529;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }
        #input-area {
            margin-top: 1rem;
        }
        .spinner-border { vertical-align: middle; }
    </style>
</head>
<body>
    <div class="container my-3">
        <div class="text-center">
            <h1 class="display-6">Conversational LLM</h1>
            <h6 class="text-muted">Mode: {{ mode }}</h6>
        </div>
        <div id="chat-window">
            <!-- Chat messages will be appended here -->
        </div>
        <div id="image-preview-container" class="d-flex flex-wrap gap-2 mb-2"></div>
        <div id="input-area" class="d-flex align-items-end">
            <input type="file" id="image-input" class="d-none" accept="image/*" multiple onchange="handleImageSelect(event)">
            <button class="btn btn-outline-secondary me-2" onclick="document.getElementById('image-input').click()">🖼️</button>
            <textarea id="query" class="form-control me-2" rows="2" placeholder="Enter your query here..."></textarea>
            <button class="btn btn-primary" onclick="sendQuery()">
                <span id="button-text">Send</span>
                <div id="loading-spinner" class="spinner-border spinner-border-sm d-none" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </button>
        </div>
    </div>
    <script>
        const mode = "{{ mode }}";
        const chatWindow = document.getElementById('chat-window');
        const queryInput = document.getElementById('query');

        function setUIState(isLoading) {
            document.getElementById('button-text').classList.toggle('d-none', isLoading);
            document.getElementById('loading-spinner').classList.toggle('d-none', !isLoading);
            document.querySelector('button').disabled = isLoading;
            queryInput.disabled = isLoading;
            if (!isLoading) {
                queryInput.focus();
            }
        }

        function appendMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return messageDiv;
        }

        async function sendQuerySingleShot(query) {
            setUIState(true);
            appendMessage(query, 'user');
            const modelMessageDiv = appendMessage('Thinking...', 'model');
            try {
                // Use the new single_shot endpoint
                const basePath = window.location.pathname.replace(/\/$/, '');
                const result = await fetch(`${basePath}/query_single_shot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const data = await result.json();
                modelMessageDiv.textContent = data.error ? `Error: ${data.error}` : data.response;
            } catch (error) {
                modelMessageDiv.textContent = `An unexpected error occurred: ${error}`;
            } finally {
                chatWindow.scrollTop = chatWindow.scrollHeight;
                setUIState(false);
            }
        }

        let selectedImages = [];

        function handleImageSelect(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImages.push(e.target.result);
                    renderImagePreviews();
                };
                reader.readAsDataURL(file);
            });
            event.target.value = ''; // Reset input
        }

        function renderImagePreviews() {
            const container = document.getElementById('image-preview-container');
            container.innerHTML = '';
            selectedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'position-relative';
                div.innerHTML = `
                    <img src="${img}" style="height: 60px; border-radius: 5px; border: 1px solid #ddd;">
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" 
                          style="cursor: pointer;" onclick="removeImage(${index})">&times;</span>
                `;
                container.appendChild(div);
            });
        }

        function removeImage(index) {
            selectedImages.splice(index, 1);
            renderImagePreviews();
        }

        async function sendQueryConversational(query) {
            setUIState(true);
            appendMessage(query, 'user');
            const modelMessageDiv = appendMessage('', 'model');
            const basePath = window.location.pathname.replace(/\/$/, '');
            
            try {
                const response = await fetch(`${basePath}/query_stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, images: selectedImages })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep partial line in buffer

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const jsonStr = line.substring(6);
                                if (!jsonStr.trim()) continue;
                                const data = JSON.parse(jsonStr);
                                if (data.chunk) {
                                    modelMessageDiv.textContent += data.chunk;
                                    chatWindow.scrollTop = chatWindow.scrollHeight;
                                }
                            } catch (e) {
                                console.error("Error parsing JSON chunk:", e, line);
                            }
                        }
                    }
                }
            } catch (error) {
                modelMessageDiv.textContent = `Error: ${error.message}`;
            } finally {
                selectedImages = [];
                renderImagePreviews();
                setUIState(false);
            }
        }

        function sendQuery() {
            const query = queryInput.value;
            if (!query.trim()) return;
            if (mode === 'conversational' || mode === 'dspy_conversational') {
                sendQueryConversational(query);
            } else {
                sendQuerySingleShot(query);
            }
            queryInput.value = ''; // Clear input after sending
        }

        queryInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendQuery();
            }
        });
    </script>
</body>
</html>
