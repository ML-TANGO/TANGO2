version: "3.8"

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-sdl}
    external: true

services:
  devices-proxy:
    image: envoyproxy/envoy:v1.32-latest
    restart: always
    expose:
      - "5000"
      - "9011"
    volumes:
      - ./envoy-proxy:/etc/envoy:ro

  devices:
    image: registry.suredatalab.kr/beymons/devices:latest
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - devices-proxy
    restart: always
    environment:
      - SECURE_MODE=${SECURE_MODE:-enforce}
      - TSDB_URL=postgres://REDACTED@${DB_HOST:-db}/${DB_NAME:-postgres}?sslmode=disable
      - ISSUER=https://keycloak.suredatalab.kr/realms/${COMPOSE_PROJECT_NAME:-sdl}
      - ZIPKIN_ENDPOINT=${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      - NATS_ENDPOINT=${NATS_ENDPOINT}
      - MQTT_ENDPOINT=${MQTT_ENDPOINT}
      - MQTT_CLIENT_ID=${MQTT_CLIENT_ID}
      - MQTT_CERT_FILE=${MQTT_CERT_FILE:-/certs/server.cert.pem}
      - MQTT_PRIVATE_KEY_FILE=${MQTT_PRIVATE_KEY_FILE:-/certs/server.private.key}
      - MQTT_ROOT_CA_FILE=${MQTT_ROOT_CA_FILE}
      - MQTT_INSECURE=${MQTT_INSECURE}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./certs:/certs

  mqtt_client:
    image: registry.suredatalab.kr/beymons/devices/mqtt:latest
    build:
      context: .
      dockerfile: mqtt_client/Dockerfile
    environment:
      - NATS_ENDPOINT=${NATS_ENDPOINT}
      - MQTT_ENDPOINT=${MQTT_ENDPOINT}
      - MQTT_TOPIC=${MQTT_TOPIC}
      - MQTT_CLIENT_ID=${MQTT_CLIENT_ID}
      - MQTT_CERT_FILE=${MQTT_CERT_FILE:-/certs/server.cert.pem}
      - MQTT_PRIVATE_KEY_FILE=${MQTT_PRIVATE_KEY_FILE:-/certs/server.private.key}
      - MQTT_ROOT_CA_FILE=${MQTT_ROOT_CA_FILE}
      - MQTT_INSECURE=${MQTT_INSECURE}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./certs:/certs
