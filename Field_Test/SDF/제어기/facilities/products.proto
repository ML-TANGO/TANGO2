		(google.api.field_behavior) = REQUIRED,
		(google.api.field_behavior) = IMMUTABLE,
		(sdlmicro.options.orm).pg = ",type:varchar(100),notnull",
		(buf.validate.field).string.min_len = 1,
		(buf.validate.field).string.max_len = 100,
		(buf.validate.field).string.not_in = "\t",
		(buf.validate.field).string.not_in = "\n",
		(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
			max_length: 100
			example: '"1중 좌측 측창"'
		}
	];

	// 연결된 Modbus 주소
	uint32 modbus = 5 [
		(google.api.field_behavior) = REQUIRED,
		(sdlmicro.options.orm).pg = ",type:integer,notnull"
	];

	// 센서 타입
	string sensor_type = 6 [
		(google.api.field_behavior) = REQUIRED,
		(sdlmicro.options.orm).pg = ",type:varchar(100),notnull",
